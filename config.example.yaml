# Example configuration for Study I (classical vs. quantum bug classification).
# Copy to config.yaml and edit; values here mirror src/study_i/schemas.TrainingConfig.

# I/O paths (env vars DATA_PATH / OUTPUT_DIR / FIGURES_DIR / TABLES_DIR
# take precedence; CLI flags override env vars).
data_path:    data/bug_patterns_labeled.json
output_dir:   results        # Trainer scratch (per-fold temp dirs).
figures_dir:  figures        # SVG/PNG figures.
tables_dir:   tables         # CSV/JSON result tables.
figure_format: svg           # one of: svg, png, pdf

# Tokenization
max_len: 256

# Cross-validation
n_folds: 5
cv_seeds: [42, 7, 2024, 99, 123]   # 5 seeds x 5 folds = 25 fold-runs per model

# Optimization
num_epochs:    12
learning_rate: 2.0e-5
batch_size:    8
eval_batch_size: 64
weight_decay:  0.05
warmup_ratio:  0.15
dropout:       0.20
val_split:     0.10

# Early stopping (on macro-F1)
es_patience: 4

# Loss
label_smoothing: 0.05

# Misc
use_fp16:       true
logging_steps:  500
label_field:    bug_category
text_fields:    [name, description, example_code]
